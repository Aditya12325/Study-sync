    const MOCK_AI_SUGGESTIONS = [
      { id: 1, type: "info", text: "You have a high focus load scheduled right before your Midterm Quiz. Consider shifting study cells 24 hours earlier to maximize cognitive retention." },

    // --- MAIN REACT APPLICATION ---
    function App() {
      // Theme state
      const [isDarkMode, setIsDarkMode] = useState(true);
      
      // Sidebar collapse
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      
      // User auth
      const [isAuthenticated, setIsAuthenticated] = useState(() => {
        return localStorage.getItem("auth_logged_in") === "true";
      });
      const [userEmail, setUserEmail] = useState(() => {
        return localStorage.getItem("auth_email") || "";
      });
      const [username, setUsername] = useState(() => {
        return localStorage.getItem("auth_username") || "Demo Student";
      });
      const [authLoading, setAuthLoading] = useState(false);
      const [authMode, setAuthMode] = useState("login"); // login | register
      const [authError, setAuthError] = useState("");

      // Settings State
      const [settings, setSettings] = useState({
        dailyHours: 3,
        focusLoad: "Balanced",
        excludeWeekends: true,
        startTime: "17:30",
        endTime: "21:30"
      });

      // Application State
      const [isSandbox, setIsSandbox] = useState(true);
      const [file, setFile] = useState(null);
      const [pdfPreviewUrl, setPdfPreviewUrl] = useState(null);
      const [uploading, setUploading] = useState(false);
      const [uploadProgress, setUploadProgress] = useState(0);
      const [uploadStage, setUploadStage] = useState("");
      
      const [tasks, setTasks] = useState([]);
      const [studyPlan, setStudyPlan] = useState([]);
      const [aiSuggestions, setAiSuggestions] = useState(MOCK_AI_SUGGESTIONS);
      const [pageCount, setPageCount] = useState(0);
      const [recentUploads, setRecentUploads] = useState([
        { name: "CS_301_Distributed_Systems_Syllabus.pdf", date: "2026-07-11", size: "1.2 MB", pageCount: 8 }
      ]);

      // Navigation
      const [currentView, setCurrentView] = useState("dashboard"); // dashboard | planner | timeline | roadmaps | analytics | settings
      
      // Search modal
      const [showSearch, setShowSearch] = useState(false);
      const [searchQuery, setSearchQuery] = useState("");
      
      // Notification dropdown
      const [showNotifications, setShowNotifications] = useState(false);
      const [notifications, setNotifications] = useState([
        { id: 1, text: "Welcome to Study Sync Premium Dashboard!", unread: true },
        { id: 2, text: "Syllabus 'CS_301_Distributed_Systems_Syllabus.pdf' parsed successfully.", unread: false }
      ]);

      // Initialize
      useEffect(() => {
        // Load settings from localStorage
        const storedSettings = localStorage.getItem("study_sync_settings");
        if (storedSettings) {
          try { setSettings(JSON.parse(storedSettings)); } catch(e) {}
        }
        
        // Sync configuration checks with server
        fetch("/api/config")
          .then(res => res.json())
          .then(data => {
            setIsSandbox(data.sandbox_mode);
            if (!data.sandbox_mode) {
              console.log("Connected to Cloud Firestore Service Node.");
            }
          })
          .catch(() => {
            setIsSandbox(true); // default to sandbox mode if server is unreachable
          });
      }, []);

      // Theme toggle handler
      useEffect(() => {
        const root = window.document.documentElement;
        if (isDarkMode) {
          root.classList.add("dark");
        } else {
          root.classList.remove("dark");
        }
      }, [isDarkMode]);

      // Save schedule
      const triggerSaveSchedule = async (updatedPlan, updatedTasks = tasks) => {
        if (isSandbox) {
          localStorage.setItem("sandbox_study_plan", JSON.stringify(updatedPlan));
          localStorage.setItem("sandbox_tasks", JSON.stringify(updatedTasks));
          return;
        }
        try {
          await fetch("/api/schedule", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: username,
              tasks: updatedTasks,
              study_plan: updatedPlan
            })
          });
        } catch(e) {
          console.error("Cloud synchronization failed: ", e);
        }
      };

      // Load Schedule on login
      useEffect(() => {
        if (!isAuthenticated) return;
        
        if (isSandbox) {
          const cachedPlan = localStorage.getItem("sandbox_study_plan");
          const cachedTasks = localStorage.getItem("sandbox_tasks");
          if (cachedPlan && cachedTasks) {
            setStudyPlan(JSON.parse(cachedPlan));
            setTasks(JSON.parse(cachedTasks));
          } else {
            // Populate defaults in Sandbox
            setStudyPlan(DEMO_PLAN);
            setTasks(DEMO_TASKS);
            localStorage.setItem("sandbox_study_plan", JSON.stringify(DEMO_PLAN));
            localStorage.setItem("sandbox_tasks", JSON.stringify(DEMO_TASKS));
          }
          setPageCount(8);
        } else {
          fetch(`/api/schedule?username=${encodeURIComponent(username)}`)
            .then(res => res.json())
            .then(data => {
              if (data && data.study_plan) {
                setStudyPlan(data.study_plan);
                setTasks(data.tasks || []);
              } else {
                setStudyPlan([]);
                setTasks([]);
              }
            })
            .catch(err => {
              console.error("Failed to load cloud schedule: ", err);
            });
        }
      }, [isAuthenticated, isSandbox, username]);

      // Auth Handler
      const handleAuth = async (e) => {
        e.preventDefault();
        setAuthError("");
        setAuthLoading(true);

        const email = e.target.email.value.trim();
        const password = e.target.password.value;
        const nameInput = e.target.username ? e.target.username.value.trim() : "";

        if (isSandbox) {
          // Simulate Local Authentication
          setTimeout(() => {
            if (authMode === "login") {
              if (password.length >= 6) {
                setIsAuthenticated(true);
                setUserEmail(email);
                setUsername(email.split("@")[0]);
                localStorage.setItem("auth_logged_in", "true");
                localStorage.setItem("auth_email", email);
                localStorage.setItem("auth_username", email.split("@")[0]);
              } else {
                setAuthError("Incorrect credentials token key string.");
              }
            } else {
              if (password.length < 6) {
                setAuthError("Password must be at least 6 characters.");
              } else {
                setIsAuthenticated(true);
                setUserEmail(email);
                setUsername(nameInput || email.split("@")[0]);
                localStorage.setItem("auth_logged_in", "true");
                localStorage.setItem("auth_email", email);
                localStorage.setItem("auth_username", nameInput || email.split("@")[0]);
              }
            }
            setAuthLoading(false);
          }, 1000);
          return;
        }

        // Production Firebase REST API Login
        try {
          const endpoint = authMode === "login" ? "/api/auth/login" : "/api/auth/register";
          const body = authMode === "login" 
            ? { email, password }
            : { email, password, username: nameInput };

          const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          const data = await res.json();
          
          if (res.status === 200 && data.success) {
            setIsAuthenticated(true);
            setUserEmail(email);
            setUsername(data.username);
            localStorage.setItem("auth_logged_in", "true");
            localStorage.setItem("auth_email", email);
            localStorage.setItem("auth_username", data.username);
          } else {
            setAuthError(data.detail || "Authentication handshake refused.");
          }
        } catch(err) {
          setAuthError("Server connection timed out.");
        } finally {
          setAuthLoading(false);
        }
      };

      const handleLogout = () => {
        setIsAuthenticated(false);
        setUserEmail("");
        setUsername("Demo Student");
        localStorage.removeItem("auth_logged_in");
        localStorage.removeItem("auth_email");
        localStorage.removeItem("auth_username");
        setCurrentView("dashboard");
      };

      // File selection handler
      const handleFileChange = (selectedFile) => {
        if (!selectedFile || selectedFile.type !== "application/pdf") {
          alert("Only syllabus vector files of PDF format are supported.");
          return;
        }
        setFile(selectedFile);
        
        // Setup visual mock PDF thumbnail
        const reader = new FileReader();
        reader.onload = () => {
          setPdfPreviewUrl(reader.result);
        };
        reader.readAsDataURL(selectedFile);
      };

      // File Drag and Drop handlers
      const [dragOver, setDragOver] = useState(false);
      const handleDragOver = (e) => {
        e.preventDefault();
        setDragOver(true);
      };
      const handleDragLeave = () => {
        setDragOver(false);
      };
      const handleDrop = (e) => {
        e.preventDefault();
        setDragOver(false);
        if (e.dataTransfer.files && e.dataTransfer.files[0]) {
          handleFileChange(e.dataTransfer.files[0]);
        }
      };

      // Upload syllabus and generate timeline
      const handleSyllabusProcess = async () => {
        if (!file) return;

        setUploading(true);
        setUploadProgress(0);
        setUploadStage("Reading document streams...");

        if (isSandbox) {
          // Sandbox local syllabus parsing simulator
          const interval = setInterval(() => {
            setUploadProgress(prev => {
              const next = prev + 5;
              if (next >= 100) {
                clearInterval(interval);
                return 100;
              }
              // Set visual stage messages
              if (next === 25) setUploadStage("Ingesting syllabus sections & formatting...");
              if (next === 50) setUploadStage("Querying Llama-3.3-70b matrix roadmap...");
              if (next === 75) setUploadStage("Writing structural timeline grids...");
              return next;
            });
          }, 150);

          setTimeout(() => {
            clearInterval(interval);
            
            // Populate realistic plan and tasks
            setStudyPlan(DEMO_PLAN);
            setTasks(DEMO_TASKS);
            triggerSaveSchedule(DEMO_PLAN, DEMO_TASKS);
            
            setPageCount(12);
            setUploading(false);
            setUploadProgress(0);
            
            // Add to recent uploads list
            const newUpload = {
              name: file.name,
              date: new Date().toISOString().split('T')[0],
              size: (file.size / (1024 * 1024)).toFixed(1) + " MB",
              pageCount: 12
            };
            setRecentUploads(prev => [newUpload, ...prev]);
            
            // Push Notification
            setNotifications(prev => [
              { id: Date.now(), text: `Syllabus '${file.name}' parsed successfully.`, unread: true },
              ...prev
            ]);
            
            setFile(null);
            setPdfPreviewUrl(null);
          }, 3500);

          return;
        }

        // Production Server Integration
        try {
          const formData = new FormData();
          formData.append("file", file);
          formData.append("study_hours", settings.dailyHours);
          formData.append("intensity", settings.focusLoad);
          formData.append("skip_weekends", settings.excludeWeekends);
          formData.append("start_time", settings.startTime);
          formData.append("end_time", settings.endTime);
          formData.append("username", username);

          // Update stages asynchronously
          const stages = ["Parsing PDF text...", "Ingesting structures...", "Generating AI schedule slots...", "Saving layout parameters..."];
          let stageIdx = 0;
          const stageInterval = setInterval(() => {
            setUploadStage(stages[stageIdx % stages.length]);
            setUploadProgress(prev => Math.min(prev + 7, 95));
            stageIdx++;
          }, 1000);

          const response = await fetch("/api/syllabus/upload", {
            method: "POST",
            body: formData
          });

          clearInterval(stageInterval);
          
          if (response.status === 200) {
            const data = await response.json();
            setUploadProgress(100);
            setUploadStage("Successfully synced database!");
            
            setTimeout(() => {
              setStudyPlan(data.study_plan);
              setTasks(data.tasks);
              setPageCount(data.page_count);
              setUploading(false);
              
              const newUpload = {
                name: file.name,
                date: new Date().toISOString().split('T')[0],
                size: (file.size / (1024 * 1024)).toFixed(1) + " MB",
                pageCount: data.page_count
              };
              setRecentUploads(prev => [newUpload, ...prev]);
              setFile(null);
              setPdfPreviewUrl(null);
            }, 500);
          } else {
            const errData = await response.json();
            alert(`Analysis Refused: ${errData.detail || "Error loading server model node"}`);
            setUploading(false);
          }
        } catch(e) {
          alert("Server timed out reading syllabus streaming vector.");
          setUploading(false);
        }
      };

      // Toggle study plan completion status
      const handleToggleStatus = (index) => {
        const updated = [...studyPlan];
        updated[index].Status = !updated[index].Status;
        setStudyPlan(updated);
        triggerSaveSchedule(updated);
      };

      // Dashboard completion calculations
      const metrics = useMemo(() => {
        if (!studyPlan.length) return { percent: 0, totalHours: 0, completedHours: 0, completedTopics: 0 };
        const completed = studyPlan.filter(i => i.Status).length;
        const percent = Math.round((completed / studyPlan.length) * 100);
        
        let totalHours = 0;
        let completedHours = 0;
        studyPlan.forEach(i => {
          const h = parseInt(i["Hours Allocated"]) || 0;
          totalHours += h;
          if (i.Status) completedHours += h;
        });

        return {
          percent,
          totalHours,
          completedHours,
          completedTopics: completed,
          totalTopics: studyPlan.length
        };
      }, [studyPlan]);

      // Calculate upcoming deadlines
      const upcomingMilestone = useMemo(() => {
        if (!tasks.length) return null;
        // Parse and sort by nearest date
        const sorted = [...tasks].sort((a,b) => new Date(a.due_date) - new Date(b.due_date));
        const nearest = sorted[0];
        
        const diffTime = new Date(nearest.due_date) - new Date();
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        return {
          name: nearest.task_name,
          date: nearest.due_date,
          daysRemaining: diffDays >= 0 ? diffDays : 0
        };
      }, [tasks]);

      // Filtered study plan for search
      const filteredSearchItems = useMemo(() => {
        if (!searchQuery) return [];
        return studyPlan.filter(item => 
          item["Focus Topic"].toLowerCase().includes(searchQuery.toLowerCase()) ||
          item["Suggested Action"].toLowerCase().includes(searchQuery.toLowerCase())
        );
      }, [searchQuery, studyPlan]);

      // Save settings
      const handleSaveSettings = (e) => {
        e.preventDefault();
        localStorage.setItem("study_sync_settings", JSON.stringify(settings));
        
        // Re-generate or simulate update notification
        setNotifications(prev => [
          { id: Date.now(), text: "Study engine configuration saved successfully.", unread: true },
          ...prev
        ]);
        alert("Parameters saved successfully.");
      };

      // --- RENDER LOGIN GATEWAY SCREEN ---
      if (!isAuthenticated) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-[#0B0F19] text-white px-4 relative overflow-hidden">
            {/* Background decorative circles */}
            <div className="absolute top-[-20%] left-[-10%] w-[50%] aspect-square rounded-full bg-[#4F8CFF]/5 filter blur-[150px] pointer-events-none"></div>
            <div className="absolute bottom-[-20%] right-[-10%] w-[50%] aspect-square rounded-full bg-[#2ECC71]/5 filter blur-[150px] pointer-events-none"></div>

            <div className="w-full max-w-md p-8 bg-[#171F32]/80 backdrop-blur-md border border-white/10 rounded-[18px] shadow-2xl relative z-10 animate-fade-in">
              <div className="text-center mb-8">
                <div className="w-12 h-12 rounded-xl bg-[#4F8CFF]/10 border border-[#4F8CFF]/20 flex items-center justify-center mx-auto mb-4 text-[#4F8CFF]">
                  <Icons.Sparkles className="w-6 h-6 animate-pulse" />
                </div>
                <h1 className="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-100 to-[#4F8CFF] bg-clip-text text-transparent">Study Sync</h1>
                <p className="text-[#94A3B8] mt-2 text-sm">AI-Powered SaaS Curriculum Timeline & Scheduler</p>
              </div>

              {authError && (
                <div className="mb-5 p-3 rounded-lg bg-[#EF4444]/10 border border-[#EF4444]/20 text-[#EF4444] text-xs flex items-start gap-2">
                  <Icons.AlertCircle className="w-4 h-4 mt-0.5 shrink-0" />
                  <span>{authError}</span>
                </div>
              )}

              <form onSubmit={handleAuth} className="space-y-5">
                {authMode === "register" && (
                  <div>
                    <label className="block text-xs font-semibold text-[#94A3B8] uppercase tracking-wider mb-2">Student Roll / Username</label>
                    <input 
                      type="text" 
                      name="username" 
                      required 
                      className="w-full bg-[#0B0F19]/50 border border-white/10 focus:border-[#4F8CFF] focus:ring-1 focus:ring-[#4F8CFF] rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 outline-none"
                      placeholder="e.g. aditya_roll45"
                    />
                  </div>
                )}

                <div>
                  <label className="block text-xs font-semibold text-[#94A3B8] uppercase tracking-wider mb-2">Account Email Address</label>
                  <input 
                    type="email" 
                    name="email" 
                    required 
                    className="w-full bg-[#0B0F19]/50 border border-white/10 focus:border-[#4F8CFF] focus:ring-1 focus:ring-[#4F8CFF] rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 outline-none"
                    placeholder="student@workspace.edu"
                  />
                </div>

                <div>
                  <label className="block text-xs font-semibold text-[#94A3B8] uppercase tracking-wider mb-2">Security Key Card Password</label>
                  <input 
                    type="password" 
                    name="password" 
                    required 
                    className="w-full bg-[#0B0F19]/50 border border-white/10 focus:border-[#4F8CFF] focus:ring-1 focus:ring-[#4F8CFF] rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-600 outline-none"
                    placeholder="••••••••"
                  />
                </div>

                <button 
                  type="submit" 
                  disabled={authLoading}
                  className="w-full bg-[#4F8CFF] hover:bg-[#4F8CFF]/90 disabled:bg-[#4F8CFF]/50 text-white rounded-lg py-2.5 text-sm font-semibold tracking-wide flex items-center justify-center gap-2"
                >
                  {authLoading ? (
                    <svg className="w-4 h-4 animate-spin text-white" fill="none" viewBox="0 0 24 24">
                      <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                      <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                  ) : (
                    <span>Access Workspace Matrix</span>
                  )}
                </button>
              </form>

              <div className="mt-6 pt-6 border-t border-white/5 text-center">
                {authMode === "login" ? (
                  <p className="text-sm text-[#94A3B8]">
                    First time onboarding?{" "}
                    <button 
                      onClick={() => setAuthMode("register")} 
                      className="text-[#4F8CFF] hover:underline font-medium"
                    >
                      Provision Credentials Account
                    </button>
                  </p>
                ) : (
                  <p className="text-sm text-[#94A3B8]">
                    Have an active profile?{" "}
                    <button 
                      onClick={() => setAuthMode("login")} 
                      className="text-[#4F8CFF] hover:underline font-medium"
                    >
                      Authenticate Access Card
                    </button>
                  </p>
                )}
              </div>

              {isSandbox && (
                <div className="mt-6 p-2 rounded bg-[#131A2A]/50 border border-white/10 text-center text-[10px] text-[#94A3B8]">
                  🔌 Standalone Simulation Active: Credentials validated locally.
                </div>
              )}
            </div>
          </div>
        );
      }

      // --- MAIN DASHBOARD LAYOUT ---
      return (
        <div className="min-h-screen bg-[#0B0F19] text-white flex relative overflow-hidden">
          
          {/* Top Decorative Blur */}
          <div className="absolute top-0 right-0 w-[50vw] aspect-square rounded-full bg-[#4F8CFF]/2 filter blur-[150px] pointer-events-none z-0"></div>

          {/* LEFT SIDEBAR PANEL */}
          <aside className={`h-screen flex flex-col justify-between shrink-0 bg-[#171F32]/80 backdrop-blur-md border-r border-white/10 z-20 ${sidebarCollapsed ? "w-20" : "w-64"}`}>
            <div>
              {/* Sidebar Header Logo */}
              <div className="p-6 flex items-center justify-between border-b border-white/5">
                <div className="flex items-center gap-3 overflow-hidden">
                  <div className="w-8 h-8 rounded-lg bg-[#4F8CFF]/15 border border-[#4F8CFF]/25 flex items-center justify-center text-[#4F8CFF] shrink-0">
                    <Icons.Sparkles className="w-5 h-5" />
                  </div>
                  {!sidebarCollapsed && (
                    <span className="font-extrabold text-lg tracking-tight bg-gradient-to-r from-white to-slate-200 bg-clip-text text-transparent">Study Sync</span>
                  )}
                </div>
                <button 
                  onClick={() => setSidebarCollapsed(!sidebarCollapsed)}
                  className="p-1 rounded hover:bg-white/5 text-[#94A3B8] hover:text-white"
                >
                  {sidebarCollapsed ? <Icons.ChevronRight className="w-4 h-4" /> : <Icons.ChevronLeft className="w-4 h-4" />}
                </button>
              </div>

              {/* Sidebar Items navigation */}
              <nav className="p-4 space-y-1.5">
                {[
                  { id: "dashboard", label: "Dashboard", icon: Icons.Home },
                  { id: "planner", label: "Study Planner", icon: Icons.Calendar },
                  { id: "timeline", label: "Timeline", icon: Icons.Clock },
                  { id: "roadmaps", label: "Roadmaps", icon: Icons.Map },
                  { id: "analytics", label: "Analytics", icon: Icons.BarChart3 },
                  { id: "settings", label: "Settings", icon: Icons.Settings },
                ].map(item => {
                  const Icon = item.icon;
                  const isActive = currentView === item.id;
                  return (
                    <button
                      key={item.id}
                      onClick={() => setCurrentView(item.id)}
                      className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-all group ${
                        isActive 
                          ? "bg-[#4F8CFF]/10 border-l-[3px] border-[#4F8CFF] text-white" 
                          : "text-[#94A3B8] hover:text-white hover:bg-white/5"
                      }`}
                    >
                      <Icon className={`w-5 h-5 shrink-0 ${isActive ? "text-[#4F8CFF]" : "text-[#94A3B8] group-hover:text-white"}`} />
                      {!sidebarCollapsed && <span>{item.label}</span>}
                    </button>
                  );
                })}
              </nav>
            </div>

            {/* Sidebar User Card Footer */}
            <div className="p-4 border-t border-white/5">
              <div className={`flex items-center gap-3 ${sidebarCollapsed ? "justify-center" : ""}`}>
                <div className="w-10 h-10 rounded-full bg-slate-800 border border-white/10 flex items-center justify-center font-bold text-sm shrink-0 text-[#4F8CFF]">
                  { (username || "Demo").slice(0, 2).toUpperCase() }
                </div>
                {!sidebarCollapsed && (
                  <div className="overflow-hidden">
                    <h4 className="text-sm font-semibold truncate text-white">{username}</h4>
                    <p className="text-xs text-[#94A3B8] truncate">{userEmail || "local@simulation.dev"}</p>
                  </div>
                )}
              </div>
              
              {!sidebarCollapsed ? (
                <button 
                  onClick={handleLogout}
                  className="w-full mt-4 flex items-center justify-center gap-2 px-3 py-2 rounded-lg bg-[#131A2A] hover:bg-white/5 border border-white/10 text-sm text-[#EF4444] font-medium transition-all"
                >
                  <Icons.LogOut className="w-4 h-4" />
                  <span>Logout Protocol</span>
                </button>
              ) : (
                <button 
                  onClick={handleLogout}
                  className="w-full mt-4 flex items-center justify-center p-2 rounded-lg bg-[#131A2A] hover:bg-white/5 border border-white/10 text-[#EF4444] transition-all"
                  title="Logout Protocol"
                >
                  <Icons.LogOut className="w-4 h-4" />
                </button>
              )}
            </div>
          </aside>

          {/* MAIN WINDOW GRID */}
          <div className="flex-1 flex flex-col h-screen overflow-y-auto z-10 relative">
            
            {/* TOP NAVIGATION BAR */}
            <header className="h-16 border-b border-white/5 px-8 flex items-center justify-between sticky top-0 bg-[#0B0F19]/80 backdrop-blur-md z-30">
              <div className="flex items-center gap-6">
                {/* Workspace indicator */}
                <div className="hidden md:flex items-center gap-2 bg-[#131A2A] px-3 py-1.5 rounded-lg border border-white/10 text-xs font-semibold text-[#94A3B8]">
                  <span className="w-2 h-2 rounded-full bg-[#4F8CFF] animate-pulse"></span>
                  <span>Active Workspace: CS Study Cluster</span>
                </div>
                
                {/* Global Search button */}
                <button 
                  onClick={() => setShowSearch(true)}
                  className="w-64 bg-[#131A2A] hover:bg-[#131A2A]/80 border border-white/10 text-[#94A3B8] text-xs rounded-lg px-3 py-2 flex items-center justify-between group"
                >
                  <div className="flex items-center gap-2">
                    <Icons.Search className="w-4 h-4 group-hover:text-white" />
                    <span>Search study cells...</span>
                  </div>
                  <kbd className="bg-[#0B0F19]/80 px-1.5 py-0.5 rounded text-[10px] border border-white/10 font-mono">⌘K</kbd>
                </button>
              </div>

              {/* Top Bar utilities */}
              <div className="flex items-center gap-4">
                
                {/* Sandbox demo banner indicator */}
                {isSandbox && (
                  <span className="hidden lg:inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-[#F59E0B]/10 text-[#F59E0B] border border-[#F59E0B]/20">
                    <Icons.Info className="w-4 h-4" />
                    <span>Demo Mode Sandbox</span>
                  </span>
                )}

                {/* Dark Mode toggle */}
                <button 
                  onClick={() => setIsDarkMode(!isDarkMode)}
                  className="p-2 rounded-lg border border-white/10 hover:bg-white/5 text-[#94A3B8] hover:text-white"
                >
                  {isDarkMode ? <Icons.Sun className="w-5 h-5" /> : <Icons.Moon className="w-5 h-5" />}
                </button>

                {/* Notifications dropdown bell */}
                <div className="relative">
                  <button 
                    onClick={() => setShowNotifications(!showNotifications)}
                    className="p-2 rounded-lg border border-white/10 hover:bg-white/5 text-[#94A3B8] hover:text-white relative"
                  >
                    <Icons.Bell className="w-5 h-5" />
                    {notifications.some(n => n.unread) && (
                      <span className="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-[#4F8CFF]"></span>
                    )}
                  </button>

                  {showNotifications && (
                    <>
                      <div className="fixed inset-0 z-40" onClick={() => setShowNotifications(false)}></div>
                      <div className="absolute right-0 mt-2 w-80 bg-[#171F32]/80 backdrop-blur-md border border-white/10 rounded-xl shadow-2xl p-4 z-50 space-y-3 animate-fade-in">
                        <h4 className="text-xs font-bold uppercase tracking-wider text-[#94A3B8] pb-2 border-b border-white/5">Recent Broadcasts</h4>
                        <div className="space-y-2 max-h-60 overflow-y-auto">
                          {notifications.length === 0 ? (
                            <p className="text-xs text-[#94A3B8] text-center py-4">No new notifications.</p>
                          ) : (
                            notifications.map(n => (
                              <div key={n.id} className={`p-2.5 rounded-lg text-xs border ${n.unread ? "bg-[#4F8CFF]/5 border-[#4F8CFF]/20" : "bg-[#131A2A]/50 border-white/10"}`}>
                                <p className={n.unread ? "text-white font-medium" : "text-[#94A3B8]"}>{n.text}</p>
                              </div>
                            ))
                          )}
                        </div>
                      </div>
                    </>
                  )}
                </div>

                {/* Topbar User Avatar */}
                <div 
                  onClick={() => setCurrentView("settings")}
                  className="w-8 h-8 rounded-full bg-slate-800 border border-white/10 flex items-center justify-center font-bold text-xs cursor-pointer text-[#4F8CFF]"
                >
                  { (username || "Demo").slice(0, 2).toUpperCase() }
                </div>
              </div>
            </header>

            {/* VIEW WRAPPER */}
            <main className="flex-1 p-8">
              <div className="h-full animate-fade-in">
                {/* --- VIEW ROUTER BRANCHES --- */}
                
                {/* VIEW: DASHBOARD */}
                {currentView === "dashboard" && (
                  <div className="space-y-8">
                    {/* Top Welcome Title */}
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                      <div>
                        <h1 className="text-4xl font-extrabold tracking-tight">Main Console</h1>
                        <p className="text-[#94A3B8] text-sm mt-1">Ingest syllabi vectors and monitor learning roadmap efficiency metrics.</p>
                      </div>
                      
                      {studyPlan.length > 0 && (
                        <div className="flex items-center gap-3">
                          <button 
                            onClick={() => setCurrentView("planner")} 
                            className="px-4 py-2 bg-[#4F8CFF] hover:bg-[#4F8CFF]/90 text-white rounded-lg text-xs font-semibold tracking-wide flex items-center gap-2"
                          >
                            <span>Review Interactive Grid</span>
                            <Icons.ArrowRight className="w-4 h-4" />
                          </button>
                        </div>
                      )}
                    </div>

                    {/* HERO BLOCK: PDF UPLOAD SYLLABUS */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                      <div className="lg:col-span-2 bg-[#171F32] border border-white/10 rounded-[18px] p-6 shadow-xl relative overflow-hidden">
                        <h2 className="text-xl font-bold tracking-tight text-white mb-4">Syllabus Ingestion Vector</h2>
                        
                        {uploading ? (
                          /* UPLOADING LOADER COMPONENT */
                          <div className="flex flex-col items-center justify-center py-12 space-y-6">
                            <div className="w-16 h-16 rounded-full border-4 border-[#4F8CFF]/20 border-t-[#4F8CFF] animate-spin"></div>
                            <div className="text-center">
                              <h4 className="text-sm font-semibold text-white">{uploadStage}</h4>
                              <p className="text-xs text-[#94A3B8] mt-1">Do not close this application frame.</p>
                            </div>
                            <div className="w-full max-w-md bg-[#131A2A]/50 border border-white/10 h-2 rounded-full overflow-hidden">
                              <div 
                                className="h-full bg-[#4F8CFF] transition-all duration-300" 
                                style={{ width: `${uploadProgress}%` }}
                              ></div>
                            </div>
                            <span className="text-xs font-bold text-[#4F8CFF]">{uploadProgress}%</span>
                          </div>
                        ) : (
                          /* FILE UPLOAD INPUT FIELD */
                          <div className="space-y-6">
                            <div 
                              onDragOver={handleDragOver}
                              onDragLeave={handleDragLeave}
                              onDrop={handleDrop}
                              className={`border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-all ${
                                dragOver 
                                  ? "border-[#4F8CFF] bg-[#4F8CFF]/5" 
                                  : "border-white/10 hover:border-[#4F8CFF]/40 hover:bg-white/2"
                              }`}
                            >
                              <input 
                                type="file" 
                                accept="application/pdf"
                                onChange={(e) => handleFileChange(e.target.files[0])}
                                className="hidden" 
                                id="syllabus-uploader-input" 
                              />
                              <label htmlFor="syllabus-uploader-input" className="cursor-pointer block space-y-4">
                                <div className="w-12 h-12 rounded-full bg-[#131A2A] border border-white/10 flex items-center justify-center mx-auto text-[#94A3B8]">
                                  <Icons.Upload className="w-5 h-5" />
                                </div>
                                <div>
                                  <h4 className="text-sm font-semibold text-white">Upload course outline</h4>
                                  <p className="text-xs text-[#94A3B8] mt-1">Drag and drop vector syllabus PDF here, or browse local volumes.</p>
                                </div>
                              </label>
                            </div>

                            {file && (
                              <div className="p-4 bg-[#131A2A] border border-white/10 rounded-xl flex items-center justify-between gap-4">
                                <div className="flex items-center gap-3 min-w-0">
                                  <div className="w-10 h-10 rounded-lg bg-red-500/10 border border-red-500/20 flex items-center justify-center text-red-500 shrink-0">
                                    <Icons.Clock className="w-5 h-5" />
                                  </div>
                                  <div className="min-w-0">
                                    <h5 className="text-xs font-semibold text-white truncate">{file.name}</h5>
                                    <p className="text-[10px] text-[#94A3B8]">{(file.size / (1024*1024)).toFixed(2)} MB • PDF Document</p>
                                  </div>
                                </div>
                                <div className="flex items-center gap-2">
                                  <button 
                                    onClick={() => { setFile(null); setPdfPreviewUrl(null); }}
                                    className="p-1.5 rounded hover:bg-white/5 text-[#94A3B8] hover:text-[#EF4444]"
                                    title="Remove"
                                  >
                                    <Icons.Trash2 className="w-4 h-4" />
                                  </button>
                                  <button 
                                    onClick={handleSyllabusProcess}
                                    className="px-3.5 py-1.5 bg-[#4F8CFF] hover:bg-[#4F8CFF]/90 text-white text-xs font-bold rounded-lg"
                                  >
                                    Generate
                                  </button>
                                </div>
                              </div>
                            )}
                          </div>
                        )}
                      </div>

                      {/* Recent Uploads List */}
                      <div className="bg-[#171F32] border border-white/10 rounded-[18px] p-6 shadow-xl flex flex-col justify-between">
                        <div>
                          <h3 className="text-base font-bold tracking-tight text-white mb-4">Ingested Vectors</h3>
                          <div className="space-y-3">
                            {recentUploads.map((item, idx) => (
                              <div key={idx} className="flex items-center justify-between p-3 bg-[#131A2A]/50 border border-white/10 rounded-xl">
                                <div className="flex items-center gap-2.5 min-w-0">
                                  <Icons.Clock className="w-4 h-4 text-[#4F8CFF] shrink-0" />
                                  <div className="min-w-0">
                                    <p className="text-xs font-semibold truncate text-white">{item.name}</p>
                                    <p className="text-[10px] text-[#94A3B8]">{item.size} • {item.pageCount} Pages • {item.date}</p>
                                  </div>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                        
                        {studyPlan.length > 0 && (
                          <div className="pt-4 border-t border-white/5 mt-4">
                            <p className="text-[10px] font-bold uppercase tracking-wider text-[#94A3B8] mb-2">Completion Velocity</p>
                            <div className="flex justify-between items-center text-xs font-semibold text-white mb-1.5">
                              <span>Study Matrix</span>
                              <span>{metrics.percent}%</span>
                            </div>
                            <div className="w-full bg-[#131A2A] border border-white/10 h-1.5 rounded-full overflow-hidden">
                              <div className="h-full bg-[#2ECC71]" style={{ width: `${metrics.percent}%` }}></div>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>

                    {/* STATS HIGHLIGHT GRID */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                      {/* Stat 1: Daily Target slider simulation */}
                      <div className="bg-[#171F32] border border-white/10 rounded-[18px] p-6 shadow-lg flex items-center justify-between">
                        <div className="space-y-2">
                          <p className="text-xs font-bold uppercase tracking-wider text-[#94A3B8]">Target Velocity</p>
                          <h3 className="text-3xl font-extrabold text-white">{settings.dailyHours} Hours <span className="text-xs font-normal text-[#94A3B8]">/ day</span></h3>
                          <p className="text-xs text-[#94A3B8]">Target Focus: <span className="text-[#4F8CFF] font-semibold">{settings.focusLoad}</span></p>
                        </div>
                        <div className="w-12 h-12 rounded-xl bg-[#4F8CFF]/10 border border-[#4F8CFF]/20 flex items-center justify-center text-[#4F8CFF]">
                          <Icons.Clock className="w-6 h-6" />
                        </div>
                      </div>

                      {/* Stat 2: Topics stats */}
                      <div className="bg-[#171F32] border border-white/10 rounded-[18px] p-6 shadow-lg flex items-center justify-between">
                        <div className="space-y-2">
                          <p className="text-xs font-bold uppercase tracking-wider text-[#94A3B8]">Curriculum Cells</p>
                          <h3 className="text-3xl font-extrabold text-white">{metrics.completedTopics} <span className="text-xs font-normal text-[#94A3B8]">/ {metrics.totalTopics} Done</span></h3>
                          <p className="text-xs text-[#94A3B8]">{metrics.totalTopics - metrics.completedTopics} Study Cells Remaining</p>
                        </div>
                        <div className="w-12 h-12 rounded-xl bg-[#4F8CFF]/10 border border-[#4F8CFF]/20 flex items-center justify-center text-[#4F8CFF]">
                          <Icons.Activity className="w-6 h-6" />
                        </div>
                      </div>

                      {/* Stat 3: Completion animated Circle Progress Ring */}
                      <div className="bg-[#171F32] border border-white/10 rounded-[18px] p-6 shadow-lg flex items-center justify-between">
                        <div className="space-y-2">
                          <p className="text-xs font-bold uppercase tracking-wider text-[#94A3B8]">Completion Ring</p>
                          <h3 className="text-3xl font-extrabold text-white">{metrics.percent}%</h3>
                          <p className="text-xs text-[#94A3B8]">{metrics.completedHours} / {metrics.totalHours} Hours Logged</p>
                        </div>
                        
                        {/* SVG Progress Circle */}
                        <div className="relative w-14 h-14 shrink-0">
                          <svg className="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path 
                              className="text-white/10" 
                              strokeWidth="3" 
                              stroke="currentColor" 
                              fill="none" 
                              d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" 
                            />
                            <path 
                              className="text-[#2ECC71]" 
                              strokeWidth="3.2" 
                              strokeDasharray={`${metrics.percent}, 100`} 
                              strokeLinecap="round" 
                              stroke="currentColor" 
                              fill="none" 
                              d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" 
                            />
                          </svg>
                          <div className="absolute inset-0 flex items-center justify-center text-[10px] font-bold text-[#2ECC71]">
                            {metrics.percent}%
                          </div>
                        </div>
                      </div>

                      {/* Stat 4: Nearest Milestone Countdown */}
                      <div className="bg-[#171F32] border border-white/10 rounded-[18px] p-6 shadow-lg flex items-center justify-between">
                        <div className="space-y-2 min-w-0">
                          <p className="text-xs font-bold uppercase tracking-wider text-[#94A3B8]">Nearest Milestone</p>
                          {upcomingMilestone ? (
                            <>
                              <h3 className="text-3xl font-extrabold text-white truncate" title={upcomingMilestone.name}>{upcomingMilestone.daysRemaining} Days</h3>
                              <p className="text-xs text-[#94A3B8] truncate">Event: <span className="text-[#EF4444] font-medium">{upcomingMilestone.name}</span></p>
                            </>
                          ) : (
                            <>
                              <h3 className="text-3xl font-extrabold text-slate-600">--</h3>
                              <p className="text-xs text-[#94A3B8]">No deadlines loaded</p>
                            </>
                          )}
                        </div>
                        <div className="w-12 h-12 rounded-xl bg-[#EF4444]/10 border border-[#EF4444]/20 flex items-center justify-center text-[#EF4444]">
                          <Icons.Calendar className="w-6 h-6" />
                        </div>
                      </div>
                    </div>

                    {/* DATA CHARTS MATRIX ROW */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                      {/* Weekly Progress Area Chart */}
                      <div className="lg:col-span-2 bg-[#171F32] border border-white/10 rounded-[18px] p-6 shadow-xl">
                        <div className="flex items-center justify-between mb-6">
                          <div>
                            <h3 className="text-lg font-bold tracking-tight text-white">Weekly Study Allocation</h3>
                            <p className="text-xs text-[#94A3B8]">Scheduled minutes distributions across calendar days</p>
                          </div>
                          <div className="flex items-center gap-2 text-xs text-[#94A3B8] bg-[#131A2A] px-2 py-1 rounded border border-white/10">
                            <span className="w-3 h-3 rounded-full bg-[#4F8CFF]"></span>
                            <span>Target Hours Met</span>
                          </div>
                        </div>
                        
                        {/* SVG Area Chart */}
                        <div className="w-full h-64 relative">
                          <svg className="w-full h-full" viewBox="0 0 500 200" preserveAspectRatio="none">
                            <defs>
                              <linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#4F8CFF" stopOpacity="0.25" />
                                <stop offset="100%" stopColor="#4F8CFF" stopOpacity="0.0" />
                              </linearGradient>
                            </defs>
                            
                            {/* Grid lines */}
                            <line x1="0" y1="50" x2="500" y2="50" stroke="rgba(255,255,255,0.03)" strokeWidth="1" />
                            <line x1="0" y1="100" x2="500" y2="100" stroke="rgba(255,255,255,0.03)" strokeWidth="1" />
                            <line x1="0" y1="150" x2="500" y2="150" stroke="rgba(255,255,255,0.03)" strokeWidth="1" />
                            
                            {/* Chart paths */}
                            <path 
                              d="M 10 180 Q 80 80 150 100 T 290 60 T 360 80 T 430 140 T 490 180 L 490 200 L 10 200 Z" 
                              fill="url(#areaGradient)" 
                            />
                            <path 
                              d="M 10 180 Q 80 80 150 100 T 290 60 T 360 80 T 430 140 T 490 180" 
                              fill="none" 
                              stroke="#4F8CFF" 
                              strokeWidth="3" 
                              strokeLinecap="round" 
                            />
                            
                            {/* Node Dots */}
                            <circle cx="80" cy="80" r="4.5" fill="#4F8CFF" stroke="#0B0F19" strokeWidth="2" />
                            <circle cx="150" cy="100" r="4.5" fill="#4F8CFF" stroke="#0B0F19" strokeWidth="2" />
                            <circle cx="220" cy="70" r="4.5" fill="#4F8CFF" stroke="#0B0F19" strokeWidth="2" />
                            <circle cx="290" cy="60" r="4.5" fill="#4F8CFF" stroke="#0B0F19" strokeWidth="2" />
                            <circle cx="360" cy="80" r="4.5" fill="#4F8CFF" stroke="#0B0F19" strokeWidth="2" />
                            <circle cx="430" cy="140" r="4.5" fill="#4F8CFF" stroke="#0B0F19" strokeWidth="2" />
                          </svg>
                          
                          {/* X-Axis labels */}
                          <div className="flex justify-between text-[10px] text-[#94A3B8] font-semibold mt-4 px-2">
                            <span>Sun</span>
                            <span>Mon</span>
                            <span>Tue</span>
                            <span>Wed</span>
                            <span>Thu</span>
                            <span>Fri</span>
                            <span>Sat</span>
                          </div>
                        </div>
                      </div>

                      {/* AI Suggestions Card */}
                      <div className="bg-[#171F32] border border-white/10 rounded-[18px] p-6 shadow-xl flex flex-col justify-between">
                        <div>
                          <div className="flex items-center gap-2 mb-4">
                            <Icons.Sparkles className="w-5 h-5 text-[#4F8CFF] animate-pulse" />
                            <h3 className="text-base font-bold tracking-tight text-white">AI Diagnostic Vector</h3>
                          </div>
                          <div className="space-y-4">
                            {aiSuggestions.map(item => (
                              <div key={item.id} className="flex gap-3 items-start text-xs border-b border-white/5 pb-3 last:border-0 last:pb-0">
                                {item.type === "info" && <Icons.Info className="w-5 h-5 text-[#4F8CFF] mt-0.5 shrink-0" />}
                                {item.type === "success" && <Icons.CheckCircle2 className="w-5 h-5 text-[#2ECC71] mt-0.5 shrink-0" />}
                                {item.type === "warning" && <Icons.AlertCircle className="w-5 h-5 text-[#F59E0B] mt-0.5 shrink-0" />}
                                <p className="text-[#94A3B8] leading-relaxed">{item.text}</p>
                              </div>
                            ))}
                          </div>
                        </div>
                        
                        <button 
                          onClick={() => {
                            alert("Recalculating focus density paths...");
                          }}
                          className="w-full mt-4 bg-[#131A2A] hover:bg-white/5 border border-white/10 text-white text-xs font-semibold py-2.5 rounded-lg transition-all"
                        >
                          Recalculate Suggestions
                        </button>
                      </div>
                    </div>

                    {/* STUDY HEATMAP CALENDAR */}
                    <div className="bg-[#171F32] border border-white/10 rounded-[18px] p-6 shadow-xl">
                      <div className="flex items-center justify-between mb-4">
                        <div>
                          <h3 className="text-base font-bold text-white">Study Velocity Map</h3>
                          <p className="text-xs text-[#94A3B8]">GitHub-style historical distribution of completed focus units over the past 12 weeks</p>
                        </div>
                        <div className="flex items-center gap-1.5 text-[10px] text-[#94A3B8] font-semibold">
                          <span>Less</span>
                          <span className="w-3 h-3 bg-[#131A2A] rounded-sm border border-white/10"></span>
                          <span className="w-3 h-3 bg-[#4F8CFF]/20 rounded-sm"></span>
                          <span className="w-3 h-3 bg-[#4F8CFF]/50 rounded-sm"></span>
                          <span className="w-3 h-3 bg-[#4F8CFF] rounded-sm"></span>
                          <span>More</span>
                        </div>
                      </div>

                      {/* Calendar Grid map */}
                      <div className="overflow-x-auto">
                        <div className="grid grid-flow-col grid-rows-7 gap-1 min-w-[650px] py-2">
                          {Array.from({ length: 84 }).map((_, idx) => {
                            let intensity = "bg-[#131A2A]";
                            if (idx % 8 === 0 || idx % 11 === 0) intensity = "bg-[#4F8CFF]/20";
                            if (idx % 14 === 0 || idx % 9 === 0) intensity = "bg-[#4F8CFF]/50";
                            if (idx % 6 === 0) intensity = "bg-[#4F8CFF]";
                            if (idx % 15 === 0) intensity = "bg-[#131A2A]";
                            
                            return (
                              <div 
                                key={idx} 
                                className={`heatmap-cell w-4 h-4 border border-white/[0.02] rounded-[2px] ${intensity}`}
                                title={`Units Studied: ${idx % 6 === 0 ? "3 hours" : "None"}`}
                              ></div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* VIEW: STUDY PLANNER */}
                {currentView === "planner" && (
                  <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                      <div>
                        <h1 className="text-3xl font-extrabold tracking-tight">Interactive Plan Grid</h1>
                        <p className="text-[#94A3B8] text-sm">Linear-style spreadsheet of active curricular cells.</p>
                      </div>
                      
                      {/* Plan Utilities */}
                      <div className="flex items-center gap-2">
                        <div className="relative">
                          <button className="px-3 py-1.5 bg-[#131A2A] border border-white/10 hover:bg-white/5 rounded-lg text-xs font-semibold text-white flex items-center gap-2">
                            <Icons.Filter className="w-4 h-4" />
                            <span>Filter</span>
                          </button>
                        </div>
                        <div className="text-xs text-[#94A3B8] font-semibold bg-[#131A2A] border border-white/10 px-3 py-1.5 rounded-lg">
                          Topics: <span className="text-white font-bold">{metrics.completedTopics} / {metrics.totalTopics}</span>
                        </div>
                      </div>
                    </div>

                    {/* DATA TABLE SHEET */}
                    <div className="bg-[#171F32] border border-white/10 rounded-[18px] shadow-xl overflow-hidden">
                      {studyPlan.length === 0 ? (
                        <div className="p-12 text-center text-[#94A3B8] space-y-3">
                          <Icons.Activity className="w-12 h-12 mx-auto text-slate-700 animate-pulse" />
                          <p className="text-sm font-semibold">No syllabus plan loaded inside terminal node.</p>
                          <button onClick={() => setCurrentView("dashboard")} className="px-4 py-2 bg-[#4F8CFF] hover:bg-[#4F8CFF]/90 text-white text-xs font-bold rounded-lg mt-2">
                            Upload Syllabus Now
                          </button>
                        </div>
                      ) : (
                        <div className="overflow-x-auto">
                          <table className="w-full border-collapse text-left">
                            <thead>
                              <tr className="border-b border-white/5 bg-[#131A2A]/50 text-[10px] font-bold uppercase tracking-wider text-[#94A3B8]">
                                <th className="py-4 px-6 w-12 text-center">Status</th>
                                <th className="py-4 px-4 w-32">Scheduled Date</th>
                                <th className="py-4 px-4 w-36">Time Slot</th>
                                <th className="py-4 px-4">Focus Curricular Topic</th>
                                <th className="py-4 px-4">Recommended Actions</th>
                                <th className="py-4 px-6 w-28 text-center">Hours</th>
                              </tr>
                            </thead>
                            <tbody className="divide-y divide-white/5 text-xs">
                              {studyPlan.map((row, idx) => (
                                <tr 
                                  key={idx} 
                                  className={`hover:bg-white/[0.02] transition-colors ${row.Status ? "text-[#94A3B8]/60 bg-white/[0.01]" : "text-white"}`}
                                >
                                  <td className="py-4.5 px-6 text-center">
                                    <button 
                                      onClick={() => handleToggleStatus(idx)}
                                      className={`w-5 h-5 rounded border flex items-center justify-center transition-all ${
                                        row.Status 
                                          ? "bg-[#2ECC71] border-[#2ECC71] text-white" 
                                          : "border-white/10 hover:border-[#4F8CFF]"
                                      }`}
                                    >
                                      {row.Status && <Icons.Check className="w-4 h-4" />}
                                    </button>
                                  </td>
                                  <td className="py-4.5 px-4 font-mono font-medium">{row["Scheduled Date"]}</td>
                                  <td className="py-4.5 px-4 font-mono text-[#94A3B8]">{row["Time Slot"]}</td>
                                  <td className="py-4.5 px-4 font-semibold max-w-xs truncate">
                                    <span className={row.Status ? "line-through text-slate-500" : ""}>
                                      {row["Focus Topic"]}
                                    </span>
                                  </td>
                                  <td className="py-4.5 px-4 text-[#94A3B8] italic max-w-sm truncate">
                                    {row["Suggested Action"]}
                                  </td>
                                  <td className="py-4.5 px-6 text-center font-mono font-bold text-[#4F8CFF]">
                                    {row["Hours Allocated"]} hrs
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* VIEW: TIMELINE */}
                {currentView === "timeline" && (
                  <div className="space-y-6">
                    <div>
                      <h1 className="text-3xl font-extrabold tracking-tight">Milestones Chronology</h1>
                      <p className="text-[#94A3B8] text-sm mt-1">Vertical timeline distribution of examinations, labs, and study checkpoints.</p>
                    </div>

                    <div className="max-w-3xl mx-auto py-8">
                      {tasks.length === 0 ? (
                        <div className="bg-[#171F32] border border-white/10 rounded-[18px] p-12 text-center text-[#94A3B8] space-y-2 shadow-xl">
                          <Icons.Clock className="w-12 h-12 mx-auto text-slate-700 animate-pulse" />
                          <p className="text-sm font-semibold">No timelines generated yet.</p>
                        </div>
                      ) : (
                        <div className="relative border-l border-white/10 pl-8 space-y-12">
                          {tasks.map((task, idx) => {
                            const diffTime = new Date(task.due_date) - new Date();
                            const days = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                            const isNear = days <= 10 && days >= 0;
                            
                            return (
                              <div key={idx} className="relative group">
                                <span className={`absolute -left-[41px] top-1.5 w-6 h-6 rounded-full border-4 border-[#0B0F19] flex items-center justify-center ${
                                  isNear ? "bg-[#EF4444] animate-ping" : "bg-[#4F8CFF]"
                                }`}></span>
                                <span className={`absolute -left-[41px] top-1.5 w-6 h-6 rounded-full border-4 border-[#0B0F19] z-10 flex items-center justify-center ${
                                  isNear ? "bg-[#EF4444]" : "bg-[#4F8CFF]"
                                }`}></span>
                                
                                <div className="bg-[#171F32] border border-white/10 hover:border-[#4F8CFF]/40 rounded-xl p-5 shadow-xl transition-all duration-300">
                                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-3">
                                    <h3 className="text-base font-bold text-white">{task.task_name}</h3>
                                    <span className="text-[10px] font-bold font-mono uppercase tracking-wider text-[#94A3B8] bg-[#131A2A] border border-white/10 px-2.5 py-1 rounded-md">
                                      {task.due_date}
                                    </span>
                                  </div>
                                  <div className="flex items-center gap-4 text-xs">
                                    <div className="flex items-center gap-1.5 text-[#94A3B8]">
                                      <Icons.Clock className="w-4 h-4 text-[#4F8CFF]" />
                                      <span>Year 2026 Milestone Node</span>
                                    </div>
                                    <div className={`font-semibold ${isNear ? "text-[#EF4444]" : "text-[#2ECC71]"}`}>
                                      {days >= 0 ? `${days} days remaining` : "Passed"}
                                    </div>
                                  </div>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* VIEW: ROADMAPS */}
                {currentView === "roadmaps" && (
                  <div className="space-y-6">
                    <div>
                      <h1 className="text-3xl font-extrabold tracking-tight">Structured Path Map</h1>
                      <p className="text-[#94A3B8] text-sm">Visual node map of chapter progressions and concept checkpoints.</p>
                    </div>

                    {studyPlan.length === 0 ? (
                      <div className="bg-[#171F32] border border-white/10 rounded-[18px] p-12 text-center text-[#94A3B8] shadow-xl">
                        <Icons.Map className="w-12 h-12 mx-auto text-slate-700 animate-pulse mb-3" />
                        <p className="text-sm font-semibold">No syllabus vectors parsed. Complete uploads first.</p>
                      </div>
                    ) : (
                      <div className="bg-[#171F32] border border-white/10 rounded-[18px] p-8 shadow-xl overflow-x-auto">
                        <div className="flex items-center gap-8 min-w-[900px] py-12 justify-center">
                          {studyPlan.slice(0, 4).map((node, idx) => (
                            <React.Fragment key={idx}>
                              <div className="w-64 p-5 bg-[#131A2A] border border-white/10 hover:border-[#4F8CFF] rounded-xl shadow-lg relative flex flex-col justify-between shrink-0 h-44">
                                <div>
                                  <div className="flex justify-between items-start gap-2 mb-2">
                                    <span className="text-[10px] font-bold uppercase tracking-wider text-[#4F8CFF] bg-[#4F8CFF]/10 px-2 py-0.5 rounded">
                                      Checkpoint 0{idx+1}
                                    </span>
                                    {node.Status ? (
                                      <span className="text-[10px] font-bold text-[#2ECC71] flex items-center gap-1">
                                        <Icons.Check className="w-4 h-4" /> Passed
                                      </span>
                                    ) : (
                                      <span className="text-[10px] text-[#94A3B8]">Locked</span>
                                    )}
                                  </div>
                                  <h4 className="text-xs font-bold text-white line-clamp-2 mt-1">{node["Focus Topic"]}</h4>
                                  <p className="text-[10px] text-[#94A3B8] mt-2 italic line-clamp-2">Task: {node["Suggested Action"]}</p>
                                </div>
                                <div className="border-t border-white/5 pt-2 flex items-center justify-between text-[10px] text-[#94A3B8] font-semibold">
                                  <span>Time: {node["Time Slot"].split(" - ")[0]}</span>
                                  <span className="text-[#4F8CFF]">{node["Hours Allocated"]} Hours</span>
                                </div>
                              </div>
                              
                              {idx < 3 && (
                                <div className="flex items-center shrink-0">
                                  <Icons.ArrowRight className="w-6 h-6 text-slate-700" />
                                </div>
                              )}
                            </React.Fragment>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* VIEW: ANALYTICS */}
                {currentView === "analytics" && (
                  <div className="space-y-8">
                    <div>
                      <h1 className="text-3xl font-extrabold tracking-tight">Diagnostics Analytics</h1>
                      <p className="text-[#94A3B8] text-sm">Deep-dive performance breakdowns of scheduled study allocations.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                      <div className="bg-[#171F32] border border-white/10 rounded-[18px] p-6 shadow-xl">
                        <h3 className="text-base font-bold text-white mb-6">Velocity Capacity Distribution</h3>
                        <div className="h-64 flex items-end justify-between gap-4 px-4 pb-2 border-b border-white/10">
                          {[
                            { label: "Unit 1", val: 80, hrs: 12 },
                            { label: "Unit 2", val: 55, hrs: 8 },
                            { label: "Unit 3", val: 95, hrs: 15 },
                            { label: "Unit 4", val: 30, hrs: 4 }
                          ].map((bar, idx) => (
                            <div key={idx} className="flex-1 flex flex-col items-center gap-3 group cursor-pointer">
                              <div className="text-[10px] font-bold text-[#4F8CFF] opacity-0 group-hover:opacity-100 transition-opacity">
                                {bar.hrs} hrs
                              </div>
                              <div 
                                className="w-full bg-[#4F8CFF]/20 hover:bg-[#4F8CFF] rounded-t-lg transition-all duration-500" 
                                style={{ height: `${bar.val}%` }}
                              ></div>
                              <span className="text-[10px] text-[#94A3B8] font-bold">{bar.label}</span>
                            </div>
                          ))}
                        </div>
                      </div>

                      <div className="bg-[#171F32] border border-white/10 rounded-[18px] p-6 shadow-xl flex flex-col justify-between">
                        <div>
                          <h3 className="text-base font-bold text-white mb-4">Study Checkpoints Mastery</h3>
                          <div className="space-y-4">
                            {[
                              { name: "Fundamentals Principles", percent: 100, color: "bg-[#2ECC71]" },
                              { name: "Architectural Formulations", percent: 80, color: "bg-[#4F8CFF]" },
                              { name: "Distributed Storage Schemas", percent: 20, color: "bg-[#F59E0B]" },
                              { name: "Fault Tolerance Matrix", percent: 0, color: "border-white/10" }
                            ].map((bar, idx) => (
                              <div key={idx} className="space-y-1.5">
                                <div className="flex justify-between text-xs font-semibold text-white">
                                  <span>{bar.name}</span>
                                  <span>{bar.percent}%</span>
                                </div>
                                <div className="w-full bg-[#131A2A] border border-white/10 h-2 rounded-full overflow-hidden">
                                  <div className={`h-full ${bar.color}`} style={{ width: `${bar.percent}%` }}></div>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                        
                        <div className="mt-6 p-4 bg-[#131A2A]/50 border border-white/10 rounded-xl text-xs text-[#94A3B8] leading-relaxed">
                          💡 <strong>Diagnostics Insight:</strong> Focus load is optimized. Storage topics require additional study velocity before dates exceed 2026-08-12.
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                {/* VIEW: SETTINGS */}
                {currentView === "settings" && (
                  <div className="max-w-3xl mx-auto bg-[#171F32] border border-white/10 rounded-[18px] p-8 shadow-xl">
                    <div className="flex items-center gap-3 border-b border-white/5 pb-6 mb-8">
                      <Icons.SlidersHorizontal className="w-6 h-6 text-[#4F8CFF]" />
                      <div>
                        <h1 className="text-2xl font-bold text-white">Curriculum Settings</h1>
                        <p className="text-xs text-[#94A3B8]">Configure default parameter boundaries for the AI timeline generator.</p>
                      </div>
                    </div>

                    <form onSubmit={handleSaveSettings} className="space-y-6">
                      <div className="space-y-2">
                        <div className="flex justify-between text-sm font-semibold text-white">
                          <label>Daily Study Velocity Capacity</label>
                          <span className="text-[#4F8CFF] font-bold">{settings.dailyHours} Hours / Day</span>
                        </div>
                        <input 
                          type="range" 
                          min="1" 
                          max="8" 
                          value={settings.dailyHours}
                          onChange={(e) => setSettings({ ...settings, dailyHours: parseInt(e.target.value) })}
                          className="w-full accent-[#4F8CFF] bg-[#131A2A] border border-white/10 rounded-lg h-2"
                        />
                        <p className="text-[10px] text-[#94A3B8]">Max time budget set per day for learning syllabus cards.</p>
                      </div>

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div className="space-y-2">
                          <label className="block text-xs font-semibold text-[#94A3B8] uppercase tracking-wider">Target Focus Density</label>
                          <select 
                            value={settings.focusLoad}
                            onChange={(e) => setSettings({ ...settings, focusLoad: e.target.value })}
                            className="w-full bg-[#131A2A] border border-white/10 rounded-lg px-4 py-2.5 text-xs font-semibold text-white outline-none focus:border-[#4F8CFF]"
                          >
                            <option value="Casual">Casual (Spread out roadmap)</option>
                            <option value="Balanced">Balanced (Standard distribution)</option>
                            <option value="Intense">Intense (Cramming roadmap)</option>
                          </select>
                        </div>

                        <div className="space-y-2">
                          <label className="block text-xs font-semibold text-[#94A3B8] uppercase tracking-wider">Exclude Weekends</label>
                          <div className="flex items-center h-11">
                            <button
                              type="button"
                              onClick={() => setSettings({ ...settings, excludeWeekends: !settings.excludeWeekends })}
                              className={`w-11 h-6 rounded-full p-1 transition-all ${
                                settings.excludeWeekends ? "bg-[#4F8CFF]" : "bg-slate-700"
                              }`}
                            >
                              <div className={`bg-white w-5 h-5 rounded-full transition-all ${
                                settings.excludeWeekends ? "translate-x-5" : "translate-x-0"
                              }`}></div>
                            </button>
                            <span className="text-xs text-[#94A3B8] font-semibold ml-3">
                              {settings.excludeWeekends ? "Weekends Blocked" : "Weekends Active"}
                            </span>
                          </div>
                        </div>
                      </div>

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 pt-4 border-t border-white/5">
                        <div className="space-y-2">
                          <label className="block text-xs font-semibold text-[#94A3B8] uppercase tracking-wider">Free Window Start</label>
                          <input 
                            type="time" 
                            value={settings.startTime}
                            onChange={(e) => setSettings({ ...settings, startTime: e.target.value })}
                            className="w-full bg-[#131A2A] border border-white/10 rounded-lg px-4 py-2 text-xs font-mono text-white outline-none focus:border-[#4F8CFF]"
                          />
                        </div>

                        <div className="space-y-2">
                          <label className="block text-xs font-semibold text-[#94A3B8] uppercase tracking-wider">Free Window End</label>
                          <input 
                            type="time" 
                            value={settings.endTime}
                            onChange={(e) => setSettings({ ...settings, endTime: e.target.value })}
                            className="w-full bg-[#131A2A] border border-white/10 rounded-lg px-4 py-2 text-xs font-mono text-white outline-none focus:border-[#4F8CFF]"
                          />
                        </div>
                      </div>

                      <div className="pt-6 border-t border-white/5 flex justify-end">
                        <button 
                          type="submit"
                          className="bg-[#4F8CFF] hover:bg-[#4F8CFF]/90 text-white rounded-lg px-6 py-2.5 text-xs font-bold tracking-wide"
                        >
                          Commit Engine Boundaries
                        </button>
                      </div>
                    </form>
                  </div>
                )}
              </div>
            </main>
          </div>

          {/* GLOBAL CMD PALETTE OVERLAY MODAL */}
          {showSearch && (
            <>
              <div className="fixed inset-0 bg-[#0B0F19]/60 backdrop-blur-sm z-40" onClick={() => setShowSearch(false)}></div>
              <div className="fixed top-[20%] left-1/2 -translate-x-1/2 w-full max-w-lg bg-[#171F32]/80 backdrop-blur-md border border-white/10 rounded-xl shadow-2xl p-4 z-50 space-y-4 animate-fade-in">
                <div className="flex items-center gap-3 bg-[#131A2A] rounded-lg px-3 py-2.5 border border-white/10">
                  <Icons.Search className="w-4 h-4 text-[#94A3B8]" />
                  <input 
                    type="text" 
                    placeholder="Type study topic name (e.g. distributed storage)..." 
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="bg-transparent border-0 outline-none text-xs text-white placeholder-slate-500 w-full"
                    autoFocus
                  />
                </div>
                
                {searchQuery && (
                  <div className="space-y-2 max-h-60 overflow-y-auto">
                    {filteredSearchItems.length === 0 ? (
                      <p className="text-xs text-[#94A3B8] text-center py-4">No matching topics found.</p>
                    ) : (
                      filteredSearchItems.map((item, idx) => (
                        <div 
                          key={idx} 
                          onClick={() => {
                            setCurrentView("planner");
                            setShowSearch(false);
                          }}
                          className="p-3 bg-[#131A2A]/50 hover:bg-[#131A2A] border border-white/10 rounded-lg text-xs cursor-pointer flex justify-between items-center gap-4 transition-all"
                        >
                          <div>
                            <p className="text-white font-semibold">{item["Focus Topic"]}</p>
                            <p className="text-[10px] text-[#94A3B8] italic mt-1">{item["Suggested Action"]}</p>
                          </div>
                          <span className="text-[10px] font-mono font-semibold text-[#4F8CFF] shrink-0">{item["Scheduled Date"]}</span>
                        </div>
                      ))
                    )}
                  </div>
                )}
                <div className="flex justify-between items-center text-[10px] text-[#94A3B8] font-semibold border-t border-white/5 pt-3">
                  <span>Search index: {studyPlan.length} total cells</span>
                  <span>Esc to dismiss</span>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    // Render the React application into the Root element
    const container = document.getElementById("root");
    const root = ReactDOM.createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
